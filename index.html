<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La mia Homepage</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            color: #222;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            font-size: 16px;
            color: white;
            background: #4facfe;
            border: none;
            border-radius: 25px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #007bff;
            transform: scale(1.05);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Immagine profilo (opzionale) -->
        <img src="https://via.placeholder.com/120" alt="Profilo" class="profile-img">

        <h1>Ciao, sono [Il tuo nome]</h1>

        <p>
            Qui puoi scrivere una breve presentazione su di te: chi sei, cosa fai,
            le tue passioni o i tuoi obiettivi. Questo è il posto perfetto per
            raccontare la tua storia in modo semplice e diretto.
        </p>

        <a href="progetti.html" class="btn">Vai ai miei progetti</a>
    </div>

</body>
</html>
